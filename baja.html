<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darse de baja · Río Profundo</title>
<meta name="description" content="Dejar de recibir los avisos de creciente y bajante de Río Profundo.">
<link rel="canonical" href="https://rioprofundo.com/baja.html">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#06141f">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
  @font-face {
    font-family: 'Fraunces'; font-style: normal; font-weight: 400 900; font-display: swap;
    src: url('fonts/fraunces-latin.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'Spline Sans Mono'; font-style: normal; font-weight: 400 600; font-display: swap;
    src: url('fonts/spline-mono-latin.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  :root {
    --abismo:#06141f; --agua:#0a2540; --cian:#5fd4e6;
    --espuma:#eaf6f8; --niebla:#8fb2c4; --rojo:#e8556b; --verde:#4fd1a5;
    --linea:rgba(143,178,196,.18); --vidrio:rgba(14,51,84,.55);
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Spline Sans Mono',monospace;
    background:radial-gradient(ellipse 120% 80% at 50% -10%, var(--agua) 0%, var(--abismo) 70%), var(--abismo);
    background-attachment:fixed; color:var(--espuma); min-height:100vh;
    padding:clamp(14px,3vw,32px); -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:560px; margin:0 auto; }

  .volver {
    display:inline-flex; align-items:center; gap:6px; text-decoration:none;
    color:var(--cian); font-size:.82rem; letter-spacing:.04em; margin-bottom:16px;
  }
  h1 {
    font-family:'Fraunces',serif; font-weight:900;
    font-size:clamp(1.6rem,5vw,2.2rem); line-height:1.1; letter-spacing:-.02em;
    color:var(--espuma); margin-bottom:20px;
  }
  .caja {
    background:var(--vidrio); border:1px solid var(--linea); border-radius:16px;
    padding:24px;
  }
  p { font-size:.86rem; line-height:1.7; color:var(--niebla); margin-bottom:16px; }
  b { color:var(--espuma); font-weight:600; }
  a { color:var(--cian); }

  input[type=email] {
    width:100%; padding:12px 14px; margin-bottom:12px;
    background:rgba(6,20,31,.6); border:1px solid var(--linea); border-radius:10px;
    color:var(--espuma); font:inherit; font-size:.95rem;
  }
  input::placeholder { color:rgba(143,178,196,.55); }
  input:focus { outline:none; border-color:var(--cian); }
  button {
    width:100%; padding:13px 20px; border:none; border-radius:10px; cursor:pointer;
    background:var(--cian); color:#06141f; font:inherit; font-weight:700; font-size:.95rem;
  }
  button:hover { opacity:.88; }
  button:disabled { opacity:.5; cursor:default; }
  .msg { font-size:.84rem; line-height:1.6; margin-top:14px; min-height:1.2em; }
  .msg.err { color:var(--rojo); }
  .msg.bien { color:var(--verde); }

  footer {
    text-align:center; color:var(--niebla); font-size:.7rem;
    margin-top:28px; letter-spacing:.08em;
  }
  footer a { color:var(--niebla); }
</style>
</head>
<body>
<div class="wrap">

  <a class="volver" href="/">◄ Volver al tablero</a>
  <h1>Dejar de recibir los avisos</h1>

  <div class="caja">
    <p>
      Poné el mail con el que te suscribiste y te mandamos un link para confirmar la baja.
    </p>
    <!-- POR QUÉ UN LINK Y NO LA BAJA DIRECTA: los avisos salen con la lista en copia
         oculta, así que el mail no puede llevar un link personal por destinatario y esta
         página sólo puede pedir la dirección. Si diera de baja directo, cualquiera podría
         desuscribir a otro con sólo saber su mail. El link lo confirma quien tiene la casilla. -->
    <form id="f" novalidate>
      <input type="email" id="email" placeholder="Tu mail" required autocomplete="email" maxlength="120">
      <button type="submit" id="btn">Enviarme el link de baja</button>
      <div class="msg" id="msg" role="status" aria-live="polite"></div>
    </form>
    <p style="margin-top:16px;font-size:.78rem">
      Si preferís, escribinos a <a href="mailto:info@rioprofundo.com">info@rioprofundo.com</a>
      y te damos de baja a mano.
    </p>
  </div>

  <footer>
    <a href="/">rioprofundo.com</a> · <a href="/terminos.html">Términos y privacidad</a>
  </footer>

</div>

<script>
(function () {
  var API = 'https://restless-smoke-596c.vresti.workers.dev/baja';
  var f = document.getElementById('f');
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');

  function decir(t, c) { msg.textContent = t; msg.className = 'msg' + (c ? ' ' + c : ''); }

  // ---- Baja de UN CLICK: el link de los mails trae ?t=TOKEN ----------------
  // Los mails apuntan acá (dominio propio) y no al Worker, porque un link a
  // workers.dev es señal de spam. La baja real la registra el Worker.
  var token = new URLSearchParams(location.search).get('t') || '';
  if (/^[A-Za-z0-9_-]{16,64}$/.test(token)) {
    f.style.display = 'none';
    var caja = f.parentNode;
    var salida = document.createElement('div');
    salida.className = 'msg';
    salida.textContent = 'Procesando la baja…';
    caja.insertBefore(salida, f);

    fetch(API + '?j=1&t=' + encodeURIComponent(token))
      .then(function (r) { return r.json(); })
      .then(function (j) {
        if (j && j.ok) {
          salida.className = 'msg bien';
          salida.textContent = 'Listo: no vas a recibir más avisos. Si fue sin querer, podés volver a suscribirte cuando quieras desde la home.';
        } else {
          salida.className = 'msg err';
          salida.textContent = 'Ese link no es válido o ya venció. Podés pedir la baja con tu mail acá abajo.';
          f.style.display = '';
        }
      })
      .catch(function () {
        salida.className = 'msg err';
        salida.textContent = 'No se pudo conectar. Probá de nuevo, o pedí la baja con tu mail acá abajo.';
        f.style.display = '';
      });
    return;
  }

  f.addEventListener('submit', function (ev) {
    ev.preventDefault();
    var email = document.getElementById('email').value.trim();
    if (email.indexOf('@') < 1) { decir('Falta el mail.', 'err'); return; }

    btn.disabled = true;
    decir('Enviando…');

    // text/plain = pedido "simple", sin preflight CORS (la web y el Worker
    // están en orígenes distintos).
    fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
      body: JSON.stringify({ email: email })
    })
    .then(function (r) { return r.json(); })
    .then(function (j) {
      if (j && j.ok) {
        decir('Listo. Si ese mail está suscripto, en un minuto te llega el link para confirmar la baja.', 'bien');
        return;
      }
      decir((j && j.msg) || 'No se pudo. Probá de nuevo en un rato.', 'err');
      btn.disabled = false;
    })
    .catch(function () {
      decir('No se pudo conectar. Probá de nuevo.', 'err');
      btn.disabled = false;
    });
  });
})();
</script>
</body>
</html>
