<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- fondo redondeado azul abismo -->
  <rect width="100" height="100" rx="22" fill="#06141f"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#0e3354" stroke-width="6"/>

  <!-- rosa de los vientos: aguja N (cian) / S (tenue) -->
  <!-- punta Norte -->
  <polygon points="50,14 41,52 50,45 59,52" fill="#5fd4e6"/>
  <!-- punta Sur -->
  <polygon points="50,86 41,48 50,55 59,48" fill="#8fb2c4" opacity="0.45"/>
  <!-- punta Este/Oeste, sutiles -->
  <polygon points="14,50 52,41 45,50 52,59" fill="#8fb2c4" opacity="0.30"/>
  <polygon points="86,50 48,41 55,50 48,59" fill="#8fb2c4" opacity="0.30"/>

  <!-- centro -->
  <circle cx="50" cy="50" r="5" fill="#06141f" stroke="#5fd4e6" stroke-width="2.5"/>

  <!-- marca Norte -->
  <circle cx="50" cy="9" r="3" fill="#5fd4e6"/>
</svg>
